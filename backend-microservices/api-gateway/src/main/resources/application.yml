server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**, /api/users/**
        - id: menu-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/menu/**
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**
        - id: request-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/requests/**
        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/notifications/**
        - id: admin-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/admin/**

management:
  endpoints:
    web:
      exposure:
        include: health, info, routes
