server:
  port: 8082

spring:
  application:
    name: menu-service
  datasource:
    url: jdbc:postgresql://localhost:5432/cafe_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
