name: Package Spring Boot Backend for Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend-spring/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

jobs:
  package-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: backend-spring
        run: mvn -B clean package -DskipTests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          OTP_PROVIDER: ${{ secrets.OTP_PROVIDER }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend-spring/target/backend-spring-*.jar
          retention-days: 7

      - name: Railway deployment reminder
        if: success()
        run: |
          echo "ℹ️  Artifact packaged successfully."
          echo "Railway deployment should be handled by Railway's GitHub integration"
          echo "pointing at the backend-spring service directory, or by Railway CLI."
          echo ""
          echo "CLI option:"
          echo "  railway link"
          echo "  railway up"

