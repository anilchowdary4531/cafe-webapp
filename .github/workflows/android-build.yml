name: Build Android Release AAB

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '*.html'
      - '*.js'
      - '*.css'
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Production API base URL (e.g. https://api.railway.app)'
        required: true
        default: 'https://YOUR_RAILWAY_URL.up.railway.app'

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Resolve mobile API URL
        run: |
          API_URL="${{ github.event.inputs.api_url || secrets.MOBILE_API_BASE_URL }}"
          if [ -z "$API_URL" ]; then
            echo "MOBILE_API_BASE_URL is required for Android release builds." >&2
            exit 1
          fi
          case "$API_URL" in
            *localhost*|*127.0.0.1*)
              echo "Release builds cannot use localhost API URLs: $API_URL" >&2
              exit 1
              ;;
          esac
          echo "MOBILE_API_BASE_URL=$API_URL" >> "$GITHUB_ENV"

      - name: Sync Capacitor web assets
        working-directory: mobile
        run: npm run cap:sync
        env:
          MOBILE_API_BASE_URL: ${{ env.MOBILE_API_BASE_URL }}

      - name: Write signing.properties
        working-directory: mobile
        run: |
          echo "storeFile=sunset-cafe-upload-key.jks" > signing.properties
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" >> signing.properties
          echo "keyAlias=sunset-cafe" >> signing.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> signing.properties

      - name: Restore keystore from secret
        working-directory: mobile
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > sunset-cafe-upload-key.jks

      - name: Build release AAB
        working-directory: mobile
        run: npm run android:bundle:release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

