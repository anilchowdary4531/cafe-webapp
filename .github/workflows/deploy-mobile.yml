name: Build and Release Mobile App

on:
  push:
    branches: [ main, master ]
    paths:
      - 'mobile/**'
      - 'index.html'
      - 'app.js'
      - 'admin.js'
      - 'staff.js'
      - 'data.js'
      - 'styles.css'
  release:
    types: [published]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: mobile/package-lock.json

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install mobile dependencies
      run: |
        cd mobile
        npm ci

    - name: Sync web assets
      run: |
        cd mobile
        npm run sync

    - name: Build Android APK
      run: |
        cd mobile
        npx cap build android --no-open
        cd android
        ./gradlew assembleDebug

    - name: Build Android AAB (Release)
      if: github.event_name == 'release'
      run: |
        cd mobile/android
        ./gradlew bundleRelease
      env:
        SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

    - name: Upload Android artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: mobile/android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Android AAB
      if: github.event_name == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: android-aab
        path: mobile/android/app/build/outputs/bundle/release/app-release.aab

  build-ios:
    runs-on: macos-latest
    if: github.event_name == 'release'
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: mobile/package-lock.json

    - name: Install mobile dependencies
      run: |
        cd mobile
        npm ci

    - name: Sync web assets
      run: |
        cd mobile
        npm run sync

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Build iOS
      run: |
        cd mobile
        npx cap build ios --no-open
        cd ios/App
        xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -archivePath $PWD/build/App.xcarchive archive
        xcodebuild -exportArchive -archivePath $PWD/build/App.xcarchive -exportPath $PWD/build -exportOptionsPlist exportOptions.plist

    - name: Upload iOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa
        path: mobile/ios/App/build/App.ipa

  release:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
    - name: Download Android artifacts
      uses: actions/download-artifact@v4
      with:
        name: android-aab

    - name: Download iOS artifacts
      uses: actions/download-artifact@v4
      with:
        name: ios-ipa

    - name: Create GitHub release assets
      run: |
        gh release upload ${{ github.event.release.tag_name }} android-aab/app-release.aab ios-ipa/App.ipa
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
