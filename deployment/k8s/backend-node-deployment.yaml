apiVersion: apps/v1
kind: Deployment
metadata:
  name: cafe-backend-node
  labels:
    app: cafe-backend-node
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cafe-backend-node
  template:
    metadata:
      labels:
        app: cafe-backend-node
    spec:
      containers:
      - name: cafe-backend-node
        image: cafe-backend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: cafe-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: cafe-secrets
              key: jwt-secret
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cafe-backend-node-service
spec:
  selector:
    app: cafe-backend-node
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cafe-backend-node-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: api.cafe-webapp.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cafe-backend-node-service
            port:
              number: 3000
