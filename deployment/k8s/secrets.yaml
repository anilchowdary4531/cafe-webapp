apiVersion: v1
kind: Secret
metadata:
  name: cafe-secrets
type: Opaque
data:
  # Base64 encoded values - replace with actual secrets
  database-url: <BASE64_DATABASE_URL>
  jwt-secret: <BASE64_JWT_SECRET>
  spring-datasource-url: <BASE64_SPRING_DATASOURCE_URL>
  postgres-db: <BASE64_POSTGRES_DB>
  postgres-user: <BASE64_POSTGRES_USER>
  postgres-password: <BASE64_POSTGRES_PASSWORD>
  twilio-account-sid: <BASE64_TWILIO_ACCOUNT_SID>
  twilio-auth-token: <BASE64_TWILIO_AUTH_TOKEN>
  twilio-phone-number: <BASE64_TWILIO_PHONE_NUMBER>
  email-user: <BASE64_EMAIL_USER>
  email-pass: <BASE64_EMAIL_PASS>
