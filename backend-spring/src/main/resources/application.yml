server:
  port: ${PORT:4100}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/cafe_webapp}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info


app:
  cors-origin: ${CORS_ORIGIN:http://localhost:8000,http://localhost,capacitor://localhost,https://sunset-cafe-site.up.railway.app}
  otp:
    expiry-seconds: ${OTP_EXPIRY_SECONDS:300}
    resend-cooldown-seconds: ${OTP_RESEND_COOLDOWN_SECONDS:30}
    max-attempts: ${OTP_MAX_ATTEMPTS:5}
    provider: ${OTP_PROVIDER:demo} # demo | msg91 | firebase
    msg91:
      auth-key: ${MSG91_AUTH_KEY:}
      sender-id: ${MSG91_SENDER_ID:}
      route: ${MSG91_ROUTE:4}
      template-id: ${MSG91_TEMPLATE_ID:}
      country-code: ${MSG91_COUNTRY_CODE:91}
  jwt:
    issuer: ${JWT_ISSUER:cafe-spring}
    secret: ${JWT_SECRET:change-this-secret-to-at-least-32-chars}
    access-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
    refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:7}
  auth:
    admin-email: ${ADMIN_ACCESS_EMAIL:anilchowdarya8@gmail.com}
    staff-email: ${STAFF_ACCESS_EMAIL:staff@sunsetcafe.local}
  firebase:
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}

